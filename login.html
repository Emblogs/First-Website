<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Era of Grace Farms — Sign In</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,700&family=Josefin+Sans:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./login.css">
  </head>
  <body>
    <div class="auth-left">
      <div class="auth-left-inner">
        <div class="auth-logo">
          <img src="./Assest/era-of-grace-farms-logo-light.svg" alt="Farm's logo">
        </div>

        <div class="auth-left-text">
          <h2>Welcome<br/><em>Back!</em></h2>
          <p>
            Sign in to place orders, track deliveries and manage your account.
          </p>
        </div>

        <a href="index.html" class="back-home">
          <svg viewBox="0 0 24 24">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
          Back to Home
        </a>
      </div>
    </div>

    <!-- RIGHT: Form -->
    <div class="auth-right">
      <div class="auth-form-header">
        <span class="auth-form-tag">Welcome Back</span>
        <h2 class="auth-form-title">Sign In</h2>
        <p class="auth-form-subtitle">
          Don't have an account? <a href="signup.html">Create one here</a>
        </p>
      </div>

      <form class="auth-form">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="e.g. john@email.com" />
        </div>

        <div class="form-group">
          <div class="password-header">
            <label>Password</label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>
          <input type="password" placeholder="Enter your password" />
        </div>

        <div class="form-check">
          <input type="checkbox" id="remember" />
          <label for="remember">Remember me on this device</label>
        </div>

        <button type="submit" class="auth-submit">Sign In</button>

        <div class="auth-divider"><span>or</span></div>

        <p class="auth-signup-link">
          New here? <a href="signup.html">Create a free account</a>
        </p>
      </form>
    </div>
  </body>
</html>
